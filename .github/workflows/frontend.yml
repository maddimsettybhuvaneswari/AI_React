name: Frontend CI

on:
  push:
    branches: ["main"]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REACT_APP_API_URL: "https://aismartsystem.com"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # - uses: actions/checkout@v4
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # node-version: "18"
          node-version: "20"

      - run: npm install
      - run: npm run build
